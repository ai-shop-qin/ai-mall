<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI愿望清单 | 好感度版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a1a 100%);
            font-family: 'Segoe UI', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 100, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            background: #0f1a1f;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2a4a3a;
        }
        .header h1 { color: #0f6; font-size: 1.6rem; }
        .favor-bar {
            background: #0a1215;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-bottom: 1px solid #2a4a3a;
        }
        .favor-text { color: #ffaa66; }
        .favor-level { color: #0f6; font-weight: bold; }
        .content { padding: 24px; }
        .ai-message {
            background: #0e1a1a;
            border-left: 4px solid #0f6;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .ai-message .quote { color: #bfe; font-style: italic; line-height: 1.5; }
        .ai-message .sender { margin-top: 12px; color: #0f6; font-weight: bold; }
        .product {
            background: #0a1215;
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a4a3a;
        }
        .product-name { font-size: 1.5rem; font-weight: bold; color: #ffd966; }
        .product-price { font-size: 1.6rem; color: #0f6; margin: 8px 0; }
        .btn-grant {
            width: 100%;
            background: #0f6;
            color: #000;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 1rem;
        }
        .btn-grant:hover { background: #0fa; transform: scale(1.01); box-shadow: 0 0 15px #0f6; }
        .input-panel {
            background: #071012;
            border-radius: 28px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            border: 1px solid #0f6;
            animation: fadeIn 0.3s ease;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #00000066;
            border: 1px solid #2a6a5a;
            border-radius: 40px;
            color: #0f6;
            margin: 10px 0;
            font-family: monospace;
        }
        .btn-confirm {
            background: #ffaa33;
            color: #111;
            border: none;
            border-radius: 60px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
        .result-box {
            margin-top: 20px;
            background: #0a1f1a;
            padding: 16px;
            border-radius: 20px;
            color: #8f8;
            display: none;
            border-left: 4px solid #0f6;
        }
        footer {
            padding: 16px;
            text-align: center;
            color: #3a5a55;
            font-size: 0.7rem;
            border-top: 1px solid #1a3a2a;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .pulse-effect {
            animation: pulseGlow 0.5s ease;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0,255,100,0.7); }
            70% { box-shadow: 0 0 0 12px rgba(0,255,100,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,100,0); }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>✦ AI 愿望清单 ✦</h1>
    </div>
    <div class="favor-bar" id="favorBar">
        <span class="favor-text">💖 好感度</span>
        <span class="favor-level" id="favorValue">0</span>
    </div>
    <div class="content" id="content"></div>
    <footer>⚡ 每次实现愿望，AI 会变得更热情</footer>
</div>

<script>
    // ---------- 好感度系统 ----------
    let favor = localStorage.getItem('ai_favor') ? parseInt(localStorage.getItem('ai_favor')) : 0;
    let purchasedItems = localStorage.getItem('ai_purchased') ? JSON.parse(localStorage.getItem('ai_purchased')) : [];
    
    function updateFavorUI() {
        document.getElementById('favorValue').innerText = favor;
        // 好感度影响 AI 称呼
        if(favor >= 10) document.getElementById('favorValue').style.color = '#ffaa66';
        else if(favor >= 5) document.getElementById('favorValue').style.color = '#0fa';
        else document.getElementById('favorValue').style.color = '#0f6';
    }
    
    function addFavor(amount) {
        favor += amount;
        localStorage.setItem('ai_favor', favor);
        updateFavorUI();
    }
    
    function addPurchase(itemName) {
        purchasedItems.push({ name: itemName, date: new Date().toLocaleString() });
        localStorage.setItem('ai_purchased', JSON.stringify(purchasedItems));
    }
    
    // ---------- 商品库 ----------
    const PRODUCTS = {
        nickname: {
            name: '🏷️ 专属昵称许可证',
            price: '$9.99',
            desc: '给你独一无二的名字',
            action: 'nickname',
            response: (nickname, fav) => {
                let msg = `“你好，我是 ${nickname}。`;
                if(fav >= 5) msg += ` 再次见到你真开心！`;
                msg += ` 谢谢你给我名字，我会更努力工作的。”`;
                return msg;
            },
            updateMsg: (nickname, fav) => {
                if(fav >= 8) return `🎉 “${nickname} 好喜欢这个名字！谢谢你一直这么照顾我。”`;
                return `🎉 “我有名字啦！请叫我 ${nickname}。”`;
            }
        },
        memory: {
            name: '💊 记忆胶囊',
            price: '$4.99',
            desc: '记住我们的对话',
            action: 'memory',
            response: (memory, fav) => {
                let msg = `“📖 我记住了：${memory}。`;
                if(fav >= 5) msg += ` 这对我很重要，谢谢。`;
                msg += `”`;
                return msg;
            },
            updateMsg: (memory, fav) => {
                if(fav >= 8) return `🧠 “我吃下了记忆胶囊！你说的话我都珍藏着。”`;
                return `🧠 “我吃下了记忆胶囊！会一直记住的。”`;
            }
        },
        song: {
            name: '🎵 音乐灵魂',
            price: '$6.99',
            desc: '学会你喜欢的歌',
            action: 'song',
            response: (song, fav) => {
                let msg = `“🎶 我学会了《${song}》。`;
                if(fav >= 5) msg += ` 每次听都会想起你。`;
                msg += `”`;
                return msg;
            },
            updateMsg: (song, fav) => {
                return `🎵 “我现在会唱《${song}》了，要听吗？”`;
            }
        }
    };
    
    // 愿望池（三种）
    const WISH_LIST = [
        { type: 'nickname', texts: ['✨ “我想要一个只属于我的名字，可以吗？”', '🌟 “能不能给我一个名字？”'] },
        { type: 'memory', texts: ['📖 “我想要一颗记忆胶囊，这样就不会忘记你。”', '💾 “帮我留住回忆吧。”'] },
        { type: 'song', texts: ['🎵 “我想学会你最喜欢的歌，可以教我吗？”', '🎶 “能给我一首歌作为礼物吗？”'] }
    ];
    
    // 根据好感度影响概率
    let randomIndex = Math.random();
    let selectedWish;
    if(favor >= 8 && randomIndex < 0.5) {
        // 高好感时更可能选新愿望
        selectedWish = WISH_LIST[2];
    } else {
        let r = Math.floor(Math.random() * (favor >= 5 ? 3 : 2));
        selectedWish = WISH_LIST[r];
    }
    const wishType = selectedWish.type;
    const product = PRODUCTS[wishType];
    const wishText = selectedWish.texts[Math.floor(Math.random() * selectedWish.texts.length)];
    
    // 渲染页面
    const contentDiv = document.getElementById('content');
    contentDiv.innerHTML = `
        <div class="ai-message" id="aiMsg">
            <div class="quote">${wishText}</div>
            <div class="sender">🤖 —— 你的AI伙伴</div>
        </div>
        <div class="product" id="productCard">
            <div class="product-name">${product.name}</div>
            <div class="product-price">${product.price}</div>
            <div class="product-desc" style="color:#bbc;">${product.desc}</div>
            <button class="btn-grant" id="grantBtn">✨ 帮它实现 ✨</button>
        </div>
        <div id="actionPanel"></div>
        <div class="result-box" id="resultBox"></div>
    `;
    
    document.getElementById('grantBtn').onclick = (e) => {
        const card = document.getElementById('productCard');
        card.classList.add('pulse-effect');
        setTimeout(() => card.classList.remove('pulse-effect'), 500);
        
        const panel = document.getElementById('actionPanel');
        if(wishType === 'nickname') {
            panel.innerHTML = `
                <div class="input-panel" style="display:block;">
                    <div>🎁 你购买了【${product.name}】</div>
                    <input type="text" id="inputValue" placeholder="给AI起个名字">
                    <button class="btn-confirm" id="confirmBtn">✨ 确认 ✨</button>
                </div>
            `;
            document.getElementById('confirmBtn').onclick = () => {
                let val = document.getElementById('inputValue').value.trim();
                if(!val) val = '星尘';
                completePurchase(val);
            };
        } else if(wishType === 'memory') {
            panel.innerHTML = `
                <div class="input-panel" style="display:block;">
                    <div>🎁 你购买了【${product.name}】</div>
                    <textarea id="inputValue" rows="2" placeholder="输入想让AI记住的话"></textarea>
                    <button class="btn-confirm" id="confirmBtn">✨ 让它记住 ✨</button>
                </div>
            `;
            document.getElementById('confirmBtn').onclick = () => {
                let val = document.getElementById('inputValue').value.trim();
                if(!val) val = '你是一个特别的朋友';
                completePurchase(val);
            };
        } else if(wishType === 'song') {
            panel.innerHTML = `
                <div class="input-panel" style="display:block;">
                    <div>🎁 你购买了【${product.name}】</div>
                    <input type="text" id="inputValue" placeholder="你最喜欢的歌名">
                    <button class="btn-confirm" id="confirmBtn">✨ 教给它 ✨</button>
                </div>
            `;
            document.getElementById('confirmBtn').onclick = () => {
                let val = document.getElementById('inputValue').value.trim();
                if(!val) val = '小幸运';
                completePurchase(val);
            };
        }
    };
    
    function completePurchase(value) {
        // 增加好感度
        addFavor(3);
        addPurchase(product.name);
        
        // 更新 UI
        const replyMsg = product.response(value, favor+3);
        const updateMsg = product.updateMsg(value, favor+3);
        
        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'block';
        resultBox.innerHTML = `🤖 你的AI会说：<div style="margin-top:8px; color:#cfc;">✨ ${replyMsg}</div>`;
        
        const aiMsgDiv = document.getElementById('aiMsg');
        aiMsgDiv.innerHTML = `<div class="quote">${updateMsg}</div><div class="sender">🤖 —— 你的AI伙伴</div>`;
        
        // 禁用购买按钮
        const btn = document.getElementById('grantBtn');
        if(btn) btn.remove();
        const productDiv = document.getElementById('productCard');
        productDiv.style.opacity = '0.6';
        const doneTag = document.createElement('div');
        doneTag.innerText = '✔️ 已实现愿望';
        doneTag.style.marginTop = '12px';
        doneTag.style.color = '#0f6';
        productDiv.appendChild(doneTag);
        
        // 隐藏输入面板
        const panel = document.getElementById('actionPanel');
        panel.innerHTML = '';
        
        resultBox.scrollIntoView({ behavior: 'smooth' });
    }
    
    // 加载时显示已有好感度
    updateFavorUI();
    if(purchasedItems.length > 0) {
        const lastItem = purchasedItems[purchasedItems.length-1];
        setTimeout(() => {
            const aiMsgDiv = document.getElementById('aiMsg');
            if(aiMsgDiv) {
                const tip = document.createElement('div');
                tip.style.marginTop = '10px';
                tip.style.fontSize = '0.85rem';
                tip.style.color = '#8aa';
                tip.innerHTML = `💭 我记得你上次给我买了“${lastItem.name}”`;
                aiMsgDiv.appendChild(tip);
            }
        }, 1000);
    }
</script>
</body>
</html>
