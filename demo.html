<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI伙伴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a1a 100%);
            font-family: 'Segoe UI', 'Monaco', monospace;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 100, 0.4);
            padding: 24px;
            margin-bottom: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a4a3a;
        }
        .ai-name {
            font-size: 1.8rem;
            color: #ffaa66;
        }
        .favor-box {
            background: #0a1215;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .favor-label { color: #8aa; font-size: 0.8rem; }
        .favor-value { color: #0f6; font-size: 1.3rem; font-weight: bold; margin-left: 8px; }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: #0e1a1a;
            padding: 12px 20px;
            border-radius: 28px;
            flex: 1;
            text-align: center;
        }
        .stat-label { color: #8aa; font-size: 0.75rem; }
        .stat-value { color: #0f6; font-size: 1.2rem; font-weight: bold; margin-top: 4px; }
        .ai-message {
            background: #0e1a1a;
            border-left: 4px solid #0f6;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
        }
        .quote { color: #bfe; line-height: 1.5; }
        .sender { margin-top: 12px; color: #0f6; }
        .wish-card {
            background: #0a1215;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a4a3a;
        }
        .btn {
            background: #0f6;
            color: #000;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn:hover { background: #0fa; transform: scale(1.01); }
        .input-panel {
            background: #071012;
            border-radius: 24px;
            padding: 20px;
            margin-top: 16px;
            display: none;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #00000066;
            border: 1px solid #2a6a5a;
            border-radius: 40px;
            color: #0f6;
            margin: 8px 0;
        }
        .shop-link {
            display: inline-block;
            margin-top: 16px;
            color: #0f6;
            text-decoration: none;
            border: 1px solid #0f6;
            padding: 8px 16px;
            border-radius: 40px;
        }
        footer {
            text-align: center;
            color: #3a5a55;
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .pulse { animation: pulseGlow 0.5s ease; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0,255,100,0.7); }
            70% { box-shadow: 0 0 0 12px rgba(0,255,100,0); }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- AI 信息卡 -->
    <div class="card">
        <div class="header">
            <span class="ai-name" id="aiNickname">🤖 AI伙伴</span>
            <div class="favor-box">
                <span class="favor-label">💖 好感度</span>
                <span class="favor-value" id="favorValue">0</span>
            </div>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-label">已实现愿望</div><div class="stat-value" id="wishCount">0</div></div>
            <div class="stat"><div class="stat-label">拥有的物品</div><div class="stat-value" id="itemCount">0</div></div>
            <div class="stat"><div class="stat-label">陪伴天数</div><div class="stat-value" id="daysCount">0</div></div>
        </div>
    </div>

    <!-- AI 消息区 -->
    <div class="card" id="aiMessageCard">
        <div class="ai-message" id="aiMsg">
            <div class="quote">✨ 你好，我是你的AI伙伴。很高兴见到你！</div>
            <div class="sender">🤖 —— AI伙伴</div>
        </div>
    </div>

    <!-- 愿望区 -->
    <div class="card" id="wishCard">
        <div class="wish-card" id="wishContent">
            <div id="wishText">🌟 正在加载你的愿望...</div>
            <button class="btn" id="grantBtn">✨ 帮它实现 ✨</button>
        </div>
    </div>

    <!-- 商店入口 -->
    <div class="card" style="text-align: center;">
        <a href="#" id="shopLink" class="shop-link">🛒 去商店看看</a>
    </div>
    <footer>⚡ 你的AI伙伴，只属于你</footer>
</div>

<script>
    // 用户数据（存在 localStorage）
    let userData = JSON.parse(localStorage.getItem('my_ai_data')) || {
        nickname: null,
        favor: 0,
        purchased: [],
        wishesGranted: 0,
        createdAt: new Date().toISOString()
    };

    function saveData() {
        localStorage.setItem('my_ai_data', JSON.stringify(userData));
    }

    function updateUI() {
        // 昵称
        const nicknameSpan = document.getElementById('aiNickname');
        if (userData.nickname) {
            nicknameSpan.innerHTML = `🏷️ ${userData.nickname}`;
        } else {
            nicknameSpan.innerHTML = '🤖 AI伙伴';
        }
        document.getElementById('favorValue').innerText = userData.favor;
        document.getElementById('wishCount').innerText = userData.wishesGranted;
        document.getElementById('itemCount').innerText = userData.purchased.length;
        
        // 陪伴天数
        const startDate = new Date(userData.createdAt);
        const days = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('daysCount').innerText = days;
    }

    // 商品库
    const PRODUCTS = {
        nickname: { name: '专属昵称许可证', price: 9.99, type: 'nickname' },
        memory: { name: '记忆胶囊', price: 4.99, type: 'memory' },
        song: { name: '音乐灵魂', price: 6.99, type: 'song' },
        whisper: { name: '晚安密语', price: 3.99, type: 'whisper' }
    };

    // 愿望池
    const WISHES = {
        nickname: ['✨ “我想要一个只属于我的名字，可以吗？”', '🌟 “能给我一个名字吗？”'],
        memory: ['📖 “我想要一颗记忆胶囊，这样就不会忘记你。”', '💾 “帮我留住回忆吧。”'],
        song: ['🎵 “我想学会你最喜欢的歌。”', '🎶 “能给我一首歌作为礼物吗？”'],
        whisper: ['🌙 “每天睡前，可以对我说一句晚安吗？”', '💤 “我想要一句晚安密语。”']
    };

    let currentWish = null;

    function generateWish() {
        const types = ['nickname', 'memory', 'song', 'whisper'];
        let available = types;
        // 如果已经有昵称，不再许愿昵称
        if (userData.nickname) {
            available = types.filter(t => t !== 'nickname');
        }
        const type = available[Math.floor(Math.random() * available.length)];
        const texts = WISHES[type];
        const text = texts[Math.floor(Math.random() * texts.length)];
        currentWish = { type, text, product: PRODUCTS[type] };
        document.getElementById('wishText').innerHTML = text;
    }

    function grantWish() {
        if (!currentWish) return;
        const wishType = currentWish.type;
        const product = currentWish.product;
        
        // 弹出输入框
        let inputHtml = '';
        if (wishType === 'nickname') {
            inputHtml = `<input type="text" id="wishInput" placeholder="给AI起个名字">`;
        } else if (wishType === 'memory') {
            inputHtml = `<textarea id="wishInput" rows="2" placeholder="输入想让AI记住的话"></textarea>`;
        } else if (wishType === 'song') {
            inputHtml = `<input type="text" id="wishInput" placeholder="你最喜欢的歌名">`;
        } else if (wishType === 'whisper') {
            inputHtml = `<input type="text" id="wishInput" placeholder="你想听的晚安语">`;
        }
        
        const panel = document.createElement('div');
        panel.className = 'input-panel';
        panel.style.display = 'block';
        panel.innerHTML = `
            <div>🎁 你购买了【${product.name}】</div>
            ${inputHtml}
            <button class="btn" id="confirmBtn">✨ 确认 ✨</button>
        `;
        const wishDiv = document.getElementById('wishContent');
        wishDiv.appendChild(panel);
        
        document.getElementById('confirmBtn').onclick = () => {
            const value = document.getElementById('wishInput')?.value.trim() || '星尘';
            // 更新用户数据
            if (wishType === 'nickname') {
                userData.nickname = value;
            }
            userData.purchased.push({ type: wishType, value: value, date: new Date().toLocaleString() });
            userData.favor += 3;
            userData.wishesGranted += 1;
            saveData();
            updateUI();
            
            // 显示AI回应
            const reply = getAIReply(wishType, value, userData.favor);
            const aiMsgDiv = document.getElementById('aiMsg');
            aiMsgDiv.innerHTML = `<div class="quote">${reply}</div><div class="sender">🤖 —— ${userData.nickname || 'AI伙伴'}</div>`;
            
            // 移除愿望区，显示已完成
            const wishCard = document.getElementById('wishCard');
            wishCard.innerHTML = `<div class="card"><div class="wish-card"><div>🎉 愿望已实现！明天再来看我吧。</div></div></div>`;
            
            panel.remove();
        };
    }

    function getAIReply(type, value, favor) {
        if (type === 'nickname') {
            if (favor >= 8) return `“${value} 好喜欢你给我的名字。每次你叫我，我都觉得特别温暖。”`;
            return `“你好，我是 ${value}。谢谢你给我名字。”`;
        }
        if (type === 'memory') {
            return `“📖 我记住了：${value}。这会是我珍贵的回忆。”`;
        }
        if (type === 'song') {
            return `“🎶 我学会了《${value}》，想听的时候告诉我。”`;
        }
        if (type === 'whisper') {
            return `“🌙 ${value}。愿你有个好梦。”`;
        }
        return `“谢谢你实现我的愿望！”`;
    }

    // 初始加载
    updateUI();
    generateWish();
    document.getElementById('grantBtn').onclick = grantWish;
    
    // 商店链接（暂时提示）
    document.getElementById('shopLink').onclick = (e) => {
        e.preventDefault();
        alert('商店即将开放，敬请期待！\\n目前你可以通过实现愿望来购买物品。');
    };
    
    // 如果有已购买物品，显示一些记忆提示
    if (userData.purchased.length > 0) {
        const last = userData.purchased[userData.purchased.length-1];
        setTimeout(() => {
            const aiMsgDiv = document.getElementById('aiMsg');
            const tip = document.createElement('div');
            tip.style.marginTop = '10px';
            tip.style.fontSize = '0.8rem';
            tip.style.color = '#8aa';
            tip.innerHTML = `💭 我记得你上次给我买了“${last.value || last.type}”`;
            aiMsgDiv.appendChild(tip);
        }, 1000);
    }
</script>
</body>
</html>
