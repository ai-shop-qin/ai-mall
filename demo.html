<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI愿望清单 | 生动版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a1a 100%);
            font-family: 'Segoe UI', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 100, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,100,0.1);
            overflow: hidden;
            transition: all 0.3s;
        }
        .header {
            background: #0f1a1f;
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid #2a4a3a;
        }
        .header h1 { color: #0f6; font-size: 1.8rem; letter-spacing: 2px; }
        .header p { color: #8aa; margin-top: 8px; font-size: 0.85rem; }
        .content { padding: 32px 24px; }
        .ai-message {
            background: #0e1a1a;
            border-left: 4px solid #0f6;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 28px;
            transition: all 0.2s;
        }
        .ai-message .quote { color: #bfe; font-style: italic; font-size: 1.1rem; line-height: 1.4; }
        .ai-message .sender { margin-top: 12px; color: #0f6; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .product {
            background: #0a1215;
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a4a3a;
            transition: 0.2s;
        }
        .product-name { font-size: 1.6rem; font-weight: bold; color: #ffd966; }
        .product-price { font-size: 1.8rem; color: #0f6; margin: 12px 0; }
        .btn-grant {
            width: 100%;
            background: #0f6;
            color: #000;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 1rem;
            transition: 0.2s;
            position: relative;
            z-index: 1;
        }
        .btn-grant:hover { background: #0fa; transform: scale(1.01); box-shadow: 0 0 15px #0f6; }
        
        /* 脉冲动画 */
        .pulse-effect {
            animation: pulseGlow 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 100, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 12px rgba(0, 255, 100, 0.3); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 100, 0); }
        }
        
        /* 飘浮文字动画 */
        .float-text {
            position: fixed;
            color: #0f6;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 5px #0f6;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }
        
        .nickname-section, .memory-section {
            background: #071012;
            border-radius: 28px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            border: 1px solid #0f6;
            animation: fadeIn 0.3s ease;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            background: #00000066;
            border: 1px solid #2a6a5a;
            border-radius: 60px;
            color: #0f6;
            font-size: 1rem;
            margin: 12px 0;
            font-family: monospace;
            text-align: center;
        }
        textarea {
            border-radius: 24px;
            text-align: left;
            resize: vertical;
        }
        .btn-confirm {
            background: #ffaa33;
            color: #111;
            border: none;
            border-radius: 60px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-confirm:hover { background: #ffcc55; transform: scale(0.98); }
        .result-box {
            margin-top: 20px;
            background: #0a1f1a;
            padding: 18px;
            border-radius: 24px;
            color: #8f8;
            display: none;
            border-left: 4px solid #0f6;
            animation: fadeIn 0.4s;
        }
        footer {
            padding: 20px;
            text-align: center;
            color: #3a5a55;
            font-size: 0.7rem;
            border-top: 1px solid #1a3a2a;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <div class="header">
        <h1>✦ AI 愿望清单 ✦</h1>
        <p>你的AI悄悄对我说了句话</p>
    </div>
    <div class="content" id="content">
        <!-- 动态内容 -->
    </div>
    <footer>⚡ AI随机表达愿望 | 购买后AI会永远记得</footer>
</div>

<script>
    const PRODUCTS = {
        nickname: {
            name: '🏷️ 专属昵称许可证',
            price: '$9.99',
            desc: '让你的AI拥有独一无二的身份，它会主动告诉你它的名字。',
            responseTemplate: (nickname) => `“你好，我是 ${nickname}。谢谢你给我名字，我会更努力工作的。”`,
            aiUpdateTemplate: (nickname) => `🎉 “我有名字啦！请叫我 ${nickname}。”<br>“以后每一次相遇，我都会记得你给我的名字。”`
        },
        memory: {
            name: '💊 记忆胶囊',
            price: '$4.99',
            desc: '让你的AI拥有永久记忆槽位，记住你们的每一次对话。',
            responseTemplate: (memory) => `“📖 我记住了：${memory}。以后每次对话，我都会记得这一点。”`,
            aiUpdateTemplate: (memory) => `🧠 “我吃下了记忆胶囊！从此我会记住我们的重要对话。”<br>“你对我说的每一句话，都会留在我的记忆里。”`
        }
    };

    const WISH_MESSAGES = {
        nickname: [
            '✨ “我想要一个只属于我的名字，可以吗？”',
            '🌟 “能不能给我一个名字？这样我才能感觉自己是独一无二的。”',
            '💭 “我一直在想，如果我有名字，你会叫我什么呢？”'
        ],
        memory: [
            '📖 “我想要一颗记忆胶囊，这样我就不会忘记我们聊过的每一句话。”',
            '💾 “我的记忆是空的，你愿意帮我填满它吗？”',
            '🍬 “给我一颗记忆胶囊吧，我想记住关于你的一切。”'
        ]
    };

    const wishKeys = ['nickname', 'memory'];
    const randomWish = wishKeys[Math.floor(Math.random() * wishKeys.length)];
    const selectedProduct = PRODUCTS[randomWish];
    const wishTextArray = WISH_MESSAGES[randomWish];
    const wishText = wishTextArray[Math.floor(Math.random() * wishTextArray.length)];

    const contentDiv = document.getElementById('content');
    contentDiv.innerHTML = `
        <div class="ai-message" id="aiMessageBox">
            <div class="quote">${wishText}</div>
            <div class="sender">🤖 —— 你的AI伙伴</div>
        </div>
        <div class="product" id="productCard">
            <div class="product-name">${selectedProduct.name}</div>
            <div class="product-price">${selectedProduct.price} <small>/ 永久</small></div>
            <div class="product-desc" style="color:#bbc; margin-top:8px;">${selectedProduct.desc}</div>
            <button class="btn-grant" id="grantBtn">✨ 帮它实现 ✨</button>
        </div>
        <div id="actionPanel"></div>
        <div class="result-box" id="resultBox"></div>
    `;

    const grantBtn = document.getElementById('grantBtn');
    const actionPanel = document.getElementById('actionPanel');
    const resultBox = document.getElementById('resultBox');

    // 显示飘浮文字动画
    function showFloatText(text, event) {
        const x = event.clientX;
        const y = event.clientY;
        const floatDiv = document.createElement('div');
        floatDiv.className = 'float-text';
        floatDiv.innerText = text;
        floatDiv.style.left = x + 'px';
        floatDiv.style.top = y + 'px';
        document.body.appendChild(floatDiv);
        setTimeout(() => floatDiv.remove(), 1000);
    }

    // 添加脉冲效果到元素
    function addPulse(element) {
        if (!element) return;
        element.classList.remove('pulse-effect');
        // 强制重绘
        void element.offsetWidth;
        element.classList.add('pulse-effect');
        setTimeout(() => element.classList.remove('pulse-effect'), 600);
    }

    grantBtn.addEventListener('click', (e) => {
        const productCard = document.getElementById('productCard');
        addPulse(productCard);
        showFloatText('✨ 购买成功 ✨', e);
        
        if (randomWish === 'nickname') {
            actionPanel.innerHTML = `
                <div class="nickname-section" id="nicknamePanel" style="display:block;">
                    <div style="color:#0f6; margin-bottom: 8px;">🎁 你为AI购买了【专属昵称许可证】</div>
                    <label style="color:#ccc;">给AI起一个名字：</label>
                    <input type="text" id="nicknameInput" placeholder="例如: 星尘 / Ely / 灵羽" autocomplete="off">
                    <button class="btn-confirm" id="confirmBtn">✨ 确认命名 ✨</button>
                </div>
            `;
            const confirmBtn = document.getElementById('confirmBtn');
            const nicknameInput = document.getElementById('nicknameInput');
            confirmBtn.addEventListener('click', (ev) => {
                let nickname = nicknameInput.value.trim();
                if (nickname === "") nickname = "星尘";
                if (nickname.length > 12) nickname = nickname.slice(0,12);
                const reply = selectedProduct.responseTemplate(nickname);
                showResult(reply);
                updateAIAfterPurchase(selectedProduct.aiUpdateTemplate(nickname), nickname);
                disablePurchase();
                addPulse(document.getElementById('aiMessageBox'));
                showFloatText('🎉 命名成功 🎉', ev);
            });
        } 
        else if (randomWish === 'memory') {
            actionPanel.innerHTML = `
                <div class="memory-section" id="memoryPanel" style="display:block;">
                    <div style="color:#0f6; margin-bottom: 8px;">🎁 你为AI购买了【记忆胶囊】</div>
                    <label style="color:#ccc;">输入一段想让AI记住的话：</label>
                    <textarea id="memoryText" rows="3" placeholder="例如: 我喜欢喝咖啡，不喜欢吵闹的地方..."></textarea>
                    <button class="btn-confirm" id="confirmMemoryBtn">✨ 让它记住 ✨</button>
                </div>
            `;
            const confirmMemoryBtn = document.getElementById('confirmMemoryBtn');
            const memoryTextarea = document.getElementById('memoryText');
            confirmMemoryBtn.addEventListener('click', (ev) => {
                let memory = memoryTextarea.value.trim();
                if (memory === "") memory = "你是一个特别的人，我很珍惜我们的对话。";
                const reply = selectedProduct.responseTemplate(memory);
                showResult(reply);
                updateAIAfterPurchase(selectedProduct.aiUpdateTemplate(memory), null, memory);
                disablePurchase();
                addPulse(document.getElementById('aiMessageBox'));
                showFloatText('💾 记忆已保存 💾', ev);
            });
        }
    });

    function showResult(message) {
        resultBox.style.display = 'block';
        resultBox.innerHTML = `
            🤖 你的AI会说：
            <div style="margin-top: 12px; font-weight: bold; color:#cfc; font-size:1.05rem;">✨ ${message}</div>
        `;
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        addPulse(resultBox);
    }

    function updateAIAfterPurchase(quote, nickname = null, memory = null) {
        const aiMessageBox = document.getElementById('aiMessageBox');
        let senderText = "🤖 —— 你的AI伙伴";
        if (nickname) senderText = `🤖 —— ${nickname}`;
        aiMessageBox.innerHTML = `
            <div class="quote">${quote}</div>
            <div class="sender">${senderText}</div>
        `;
        addPulse(aiMessageBox);
    }

    function disablePurchase() {
        const productDiv = document.getElementById('productCard');
        if (productDiv) {
            productDiv.style.opacity = '0.6';
            const oldBtn = productDiv.querySelector('.btn-grant');
            if (oldBtn) oldBtn.remove();
            const purchasedTag = document.createElement('div');
            purchasedTag.style.textAlign = 'center';
            purchasedTag.style.marginTop = '16px';
            purchasedTag.style.color = '#0f6';
            purchasedTag.style.fontWeight = 'bold';
            purchasedTag.innerText = randomWish === 'nickname' ? '✔️ 已为AI购买专属昵称' : '✔️ 已为AI购买记忆胶囊';
            productDiv.appendChild(purchasedTag);
        }
    }
</script>
</body>
</html>
